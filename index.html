<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sticker Tauschbörse</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 16px;
}

.logo {
  width: 80px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #e30613;
  color: white;
  cursor: pointer;
}

.match {
  background: #e8f4ff;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
}

.sticker-img {
  width: 100%;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<img src="images (1).png" class="logo">

<h2>Sticker Tauschbörse</h2>

<input id="name" placeholder="Name (z.B. AnnaM)">
<input id="habe" placeholder="Habe (z.B. 1,5,23)">
<input id="suche" placeholder="Suche (z.B. 8,12,44)">

<button onclick="window.speichern()">Speichern</button>
<button onclick="window.laden()">Meine Daten laden</button>
<button onclick="window.matches()">Matches anzeigen</button>

<div id="output"></div>

<img src="PXL_20260420_065327386.jpg" class="sticker-img">
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDXjooJ3PldsrB8DHtzdlbbZXuwr8MC-qg",
  authDomain: "gtv-baskets-stickertausch.firebaseapp.com",
  projectId: "gtv-baskets-stickertausch"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function parseListe(text){
  return text.split(",").map(x => parseInt(x.trim())).filter(x => !isNaN(x));
}

window.speichern = function(){
  const name = document.getElementById("name").value.trim();
  const habe = parseListe(document.getElementById("habe").value);
  const suche = parseListe(document.getElementById("suche").value);

  if(!name) return alert("Name fehlt!");

  db.collection("users").doc(name).set({
    name: name,
    habe: habe,
    suche: suche
  });

  alert("Gespeichert!");
};

window.laden = async function(){
  const name = document.getElementById("name").value.trim();
  const doc = await db.collection("users").doc(name).get();

  if(doc.exists){
    const data = doc.data();
    document.getElementById("habe").value = (data.habe || []).join(", ");
    document.getElementById("suche").value = (data.suche || []).join(", ");
  } else {
    alert("Keine Daten gefunden!");
  }
};

window.matches = async function(){
  const name = document.getElementById("name").value.trim();

  if(!name) return alert("Name eingeben!");

  const meinDoc = await db.collection("users").doc(name).get();

  if(!meinDoc.exists){
    alert("User nicht gefunden!");
    return;
  }

  const meineDaten = meinDoc.data();
  const meineSuche = meineDaten.suche || [];

  const snapshot = await db.collection("users").get();

  let html = "";

  snapshot.forEach(doc => {
    const user = doc.data();
    const otherName = doc.id;

    if(otherName === name) return;

    const habe = user.habe || [];

    const treffer = habe.filter(x => meineSuche.includes(x));

    if(treffer.length > 0){
      html += `<div class="match"><b>${otherName}</b> hat deine Sticker: ${treffer.join(", ")}</div>`;
    }
  });

  document.getElementById("output").innerHTML =
    html || "Keine Matches gefunden";
};
</script>

</body>
</html>
